  <div class="cert-item">
    <div class="group relative w-full max-w-[420px] aspect-[4/3] rounded-[20px] bg-[#2b2b2b]

              shadow-[0_8px_20px_#00000066]
              transition duration-300 ease-in-out
              hover:scale-105 hover:shadow-[0_15px_30px_#00000088] hover:z-20">

      <!-- IMAGE (click to enlarge) -->
      <img src="images/Word Certidication-1.png"
           class="w-full h-full object-contain cursor-pointer"
           onclick="openModal(this.src)">

      <!-- BUTTON (hover popup) -->
      <a href="https://www.certiport.com/portal/pages/credentialverification.aspx" target="_blank">
        <button class="absolute bottom-4 left-1/2 -translate-x-1/2
                       bg-[#1e96fc] text-white px-4 py-2 rounded-lg
                       opacity-0 group-hover:opacity-100
                       translate-y-2 group-hover:translate-y-0
                       transition duration-300 shadow-md
                       bg-[#1e96fc] hover:bg-[#187ad1]">
          Verify Certification
        </button>
      </a>

    </div>
    <p class="cert-label">Word Certification</p>
  </div>
